automations:
  # If your workspace includes non-Data Ops flows, add match/match_related filters
  # before applying these templates.
  - name: Data Ops - Flow Failure Alert
    description: Alert immediately when a Data Ops flow run fails.
    enabled: true
    trigger:
      type: event
      posture: Reactive
      expect:
        - prefect.flow-run.Failed
        - prefect.flow-run.Crashed
      threshold: 1
    actions:
      - type: call-webhook
        block_document_id: "e60319d8-225b-4560-9c71-54f052011b5c"
        payload: |
          {
            "severity": "error",
            "title": "Data Ops flow failed",
            "flow": "{{ flow.name }}",
            "flow_run": "{{ flow_run.name }}",
            "state": "{{ flow_run.state.name }}",
            "deployment": "{{ deployment.name }}",
            "ui_url": "{{ flow_run|ui_url }}"
          }

  - name: Data Ops - Repeated Failures Escalation
    description: Escalate if multiple flow failures occur inside the lookback window.
    enabled: true
    trigger:
      type: event
      posture: Reactive
      expect:
        - prefect.flow-run.Failed
        - prefect.flow-run.Crashed
      threshold: 3
      within: 21600
    actions:
      - type: call-webhook
        block_document_id: "e60319d8-225b-4560-9c71-54f052011b5c"
        payload: |
          {
            "severity": "critical",
            "title": "Data Ops repeated failures escalation",
            "message": "Three or more failed/crashed runs were observed in the last 6 hours.",
            "flow_run": "{{ flow_run.name }}",
            "deployment": "{{ deployment.name }}",
            "ui_url": "{{ flow_run|ui_url }}"
          }

  - name: Data Ops - Missed Schedule Alert
    description: Alert when a scheduled flow run is late/missed.
    enabled: true
    trigger:
      type: event
      posture: Reactive
      expect:
        - prefect.flow-run.Late
      threshold: 1
    actions:
      - type: call-webhook
        block_document_id: "e60319d8-225b-4560-9c71-54f052011b5c"
        payload: |
          {
            "severity": "warning",
            "title": "Data Ops schedule missed",
            "flow": "{{ flow.name }}",
            "flow_run": "{{ flow_run.name }}",
            "deployment": "{{ deployment.name }}",
            "ui_url": "{{ flow_run|ui_url }}"
          }

  - name: Data Ops - Long Running Flow Alert
    description: Alert if a flow run does not complete within 45 minutes.
    enabled: true
    trigger:
      type: event
      posture: Proactive
      expect:
        - prefect.flow-run.Completed
      threshold: 1
      within: 2700
      for_each:
        - prefect.resource.id
    actions:
      - type: call-webhook
        block_document_id: "e60319d8-225b-4560-9c71-54f052011b5c"
        payload: |
          {
            "severity": "warning",
            "title": "Data Ops long-running flow detected",
            "message": "A flow run has not completed within 45 minutes.",
            "flow_run": "{{ flow_run.name }}",
            "deployment": "{{ deployment.name }}",
            "ui_url": "{{ flow_run|ui_url }}"
          }
