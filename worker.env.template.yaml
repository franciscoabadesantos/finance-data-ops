DATA_OPS_DATABASE_URL: "postgresql://finance_ops:__PASSWORD__@127.0.0.1:6432/finance"
DATA_OPS_CACHE_ROOT: "/var/lib/finance-data-ops/cache"
DATA_OPS_ALERT_WEBHOOK_URL: "__OPTIONAL__"
DATA_OPS_SYMBOL_BATCH_SIZE: "100"
DATA_OPS_LOOKBACK_DAYS: "400"
DATA_OPS_MAX_ATTEMPTS: "3"

PREFECT_API_URL: "https://api.prefect.cloud/api/accounts/__ACCOUNT__/workspaces/__WORKSPACE__"
PREFECT_API_KEY: "__FROM_SECRET__"
PREFECT_WORK_POOL: "finance-ops-self-host"

DATA_OPS_DAILY_INFERENCE_COMMAND: "__SET_ON_SERVER__: command must emit daily inference result JSON; payload path is {payload_path}"
DATA_OPS_DAILY_INFERENCE_CONFIG_REF: "/opt/finance/configs/daily_inference.yml"
