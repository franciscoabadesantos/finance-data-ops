name: Daily Market Refresh

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols (optional override)"
        required: false
        type: string
      lookback_days:
        description: "Lookback window if start is not passed"
        required: false
        type: string
      start:
        description: "Optional YYYY-MM-DD"
        required: false
        type: string
      end:
        description: "Optional YYYY-MM-DD"
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run daily Data Ops flow
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA_OPS_SYMBOLS: ${{ github.event.inputs.symbols || vars.DATA_OPS_SYMBOLS }}
          DATA_OPS_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || vars.DATA_OPS_LOOKBACK_DAYS || '400' }}
          DATA_OPS_MAX_ATTEMPTS: ${{ vars.DATA_OPS_MAX_ATTEMPTS || '3' }}
          DATA_OPS_SYMBOL_BATCH_SIZE: ${{ vars.DATA_OPS_SYMBOL_BATCH_SIZE || '100' }}
          DATA_OPS_ALERT_WEBHOOK_URL: ${{ secrets.DATA_OPS_ALERT_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.start }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --start ${{ github.event.inputs.start }}"
          fi
          if [ -n "${{ github.event.inputs.end }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --end ${{ github.event.inputs.end }}"
          fi
          python scripts/run_market_daily.py $EXTRA_ARGS
