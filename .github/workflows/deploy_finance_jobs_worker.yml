name: Deploy Finance Jobs Worker

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-finance-jobs-worker-main
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'finance-data-ops' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  WORKER_SERVICE: ${{ vars.GCP_WORKER_SERVICE || 'finance-jobs-worker' }}
  GCP_WORKER_MEMORY: ${{ vars.GCP_WORKER_MEMORY || '1Gi' }}
  GCP_TASKS_QUEUE: ${{ vars.GCP_TASKS_QUEUE || 'ticker-jobs' }}
  SUPABASE_URL: ${{ vars.SUPABASE_URL }}
  GSM_SUPABASE_SERVICE_ROLE_KEY_SECRET: ${{ vars.GSM_SUPABASE_SERVICE_ROLE_KEY_SECRET }}
  GSM_WORKER_SHARED_TOKEN_SECRET: ${{ vars.GSM_WORKER_SHARED_TOKEN_SECRET }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
  GCP_WORKER_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_WORKER_RUNTIME_SERVICE_ACCOUNT }}
  TASKS_INVOKER_SERVICE_ACCOUNT_EMAIL: ${{ vars.TASKS_INVOKER_SERVICE_ACCOUNT_EMAIL }}

jobs:
  deploy:
    if: >-
      ${{
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.head_branch == 'main')
        || github.event_name == 'workflow_dispatch'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout target revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOYER_SERVICE_ACCOUNT
            SUPABASE_URL
            GSM_SUPABASE_SERVICE_ROLE_KEY_SECRET
          )
          for name in "${REQUIRED_VARS[@]}"; do
            value="${!name:-}"
            if [ -z "${value}" ]; then
              echo "Missing required repository variable: ${name}"
              exit 1
            fi
          done

      - name: Resolve image tag
        id: image
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          IMAGE_URI="gcr.io/${GCP_PROJECT_ID}/${WORKER_SERVICE}:${SHORT_SHA}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "Using image: ${IMAGE_URI}"

      - name: Build and push worker image
        run: |
          set -euo pipefail
          gcloud builds submit . \
            --project "${GCP_PROJECT_ID}" \
            --tag "${{ steps.image.outputs.image_uri }}" \
            --file services/finance-jobs-worker/Dockerfile

      - name: Deploy Cloud Run worker
        run: |
          set -euo pipefail
          DEPLOY_ARGS=(
            --project "${GCP_PROJECT_ID}"
            --region "${GCP_REGION}"
            --image "${{ steps.image.outputs.image_uri }}"
            --memory "${GCP_WORKER_MEMORY}"
            --set-env-vars "SUPABASE_URL=${SUPABASE_URL},FINANCE_DATA_OPS_ROOT=/app,CLOUD_TASKS_ENABLED=true,GCP_PROJECT_ID=${GCP_PROJECT_ID},GCP_LOCATION=${GCP_REGION},GCP_TASKS_QUEUE=${GCP_TASKS_QUEUE}"
            --set-secrets "SUPABASE_SERVICE_ROLE_KEY=${GSM_SUPABASE_SERVICE_ROLE_KEY_SECRET}:latest"
            --quiet
          )

          if [ -n "${GCP_WORKER_RUNTIME_SERVICE_ACCOUNT:-}" ]; then
            DEPLOY_ARGS+=(--service-account "${GCP_WORKER_RUNTIME_SERVICE_ACCOUNT}")
          fi

          if [ -n "${TASKS_INVOKER_SERVICE_ACCOUNT_EMAIL:-}" ]; then
            DEPLOY_ARGS+=(--set-env-vars "TASKS_INVOKER_SERVICE_ACCOUNT_EMAIL=${TASKS_INVOKER_SERVICE_ACCOUNT_EMAIL}")
          fi

          if [ -n "${GSM_WORKER_SHARED_TOKEN_SECRET:-}" ]; then
            DEPLOY_ARGS+=(--set-secrets "WORKER_SHARED_TOKEN=${GSM_WORKER_SHARED_TOKEN_SECRET}:latest")
          fi

          gcloud run deploy "${WORKER_SERVICE}" \
            "${DEPLOY_ARGS[@]}"

      - name: Wire WORKER_BASE_URL
        run: |
          set -euo pipefail
          WORKER_URL="$(gcloud run services describe "${WORKER_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"
          if [ -z "${WORKER_URL}" ]; then
            echo "Failed to resolve deployed worker URL."
            exit 1
          fi
          gcloud run services update "${WORKER_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --update-env-vars "WORKER_BASE_URL=${WORKER_URL}" \
            --quiet

      - name: Show deployed revision
        run: |
          set -euo pipefail
          gcloud run services describe "${WORKER_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(status.latestReadyRevisionName,spec.template.spec.containers[0].image)'
