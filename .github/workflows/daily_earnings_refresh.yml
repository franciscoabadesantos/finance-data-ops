name: Daily Earnings Refresh

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols (optional override)"
        required: false
        type: string
      history_limit:
        description: "Optional earnings history row limit override"
        required: false
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run daily Data Ops earnings flow
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA_OPS_SYMBOLS: ${{ github.event.inputs.symbols || vars.DATA_OPS_SYMBOLS }}
          DATA_OPS_MAX_ATTEMPTS: ${{ vars.DATA_OPS_MAX_ATTEMPTS || '3' }}
          DATA_OPS_ALERT_WEBHOOK_URL: ${{ secrets.DATA_OPS_ALERT_WEBHOOK_URL }}
          DATA_OPS_HISTORY_LIMIT: ${{ github.event.inputs.history_limit || '' }}
        run: |
          set -euo pipefail
          if [ -n "$DATA_OPS_HISTORY_LIMIT" ]; then
            python scripts/run_earnings_daily.py --history-limit "$DATA_OPS_HISTORY_LIMIT"
          else
            python scripts/run_earnings_daily.py
          fi
