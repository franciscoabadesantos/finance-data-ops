name: finance-data-ops
prefect-version: null

build: []
push: []
pull: []

deployments:
  - name: market-daily
    version: null
    tags:
      - dataops
      - market
      - daily
    description: Data Ops market daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_market_daily_flow
    parameters:
      symbols: null
      start: null
      end: null
      lookback_days: null
      region: null
    schedules:
      - cron: "20 2 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-pool
      work_queue_name: default
      job_variables: {}

  - name: fundamentals-daily
    version: null
    tags:
      - dataops
      - fundamentals
      - daily
    description: Data Ops fundamentals daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_fundamentals_daily_flow
