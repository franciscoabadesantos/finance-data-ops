name: finance-data-ops
prefect-version: null

build: []
push: []
pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/franciscoabadesantos/finance-data-ops.git
      branch: main

definitions:
  work_pool: &self_host_pool
    name: finance-ops-self-host
    work_queue_name: default
    job_variables:
      env:
        DATA_OPS_DATABASE_URL: "{{ prefect.blocks.secret.finance-data-ops-database-url }}"
        DATA_OPS_CACHE_ROOT: "/var/lib/finance-data-ops/cache"
        DATA_OPS_ALERT_WEBHOOK_URL: "{{ prefect.blocks.secret.data-ops-alert-webhook-url }}"
        DATA_OPS_SYMBOL_BATCH_SIZE: "100"
        FEATURE_BUILD_DAILY_DEPLOYMENT: "feature-build-daily/feature-build-daily"
        FEATURE_SCORECARD_BUILD_DEPLOYMENT: ""
        DATA_OPS_ALLOW_TICKER_REGISTRY_UNIVERSE: "false"
        DATA_OPS_DAILY_INFERENCE_COMMAND: "{{ prefect.blocks.secret.data-ops-daily-inference-command }}"
        DATA_OPS_DAILY_INFERENCE_CONFIG_REF: "{{ prefect.blocks.secret.data-ops-daily-inference-config-ref }}"
        DATA_OPS_SYMBOLS_US: "AAPL,ADBE,AMD,AMZN,AVGO,BRK-B,COST,DIA,GOOGL,INTC,IWM,JPM,KO,MA,META,MSFT,NFLX,NVDA,PFE,PG,PLTR,QQQ,SPY,TSLA,UBER,UNH,V,VOO,VTI,XOM,VGK,EZU,EWI,EWP,EWU,FEZ,BABA,TSM,JD,BIDU,NTES,MELI,VALE,PBR,EWJ,FXI,MCHI,INDA,EWA,EWZ"
        DATA_OPS_SYMBOLS_EU: "SAP.DE,DBK.DE,ASML.AS,TTE.PA,SAN.PA,SHEL.L,HSBA.L,AZN.L,BP.L,ULVR.L,GSK.L,NOVO-B.CO,EDP.LS,GALP.LS,JMT.LS,BCP.LS,SON.LS,NOS.LS,EGL.LS,COR.LS,RENE.LS,NVG.LS"
        DATA_OPS_SYMBOLS_APAC: "ANZ.AX,WBC.AX,WOW.AX,BHP.AX,CBA.AX,CSL.AX,NAB.AX,WES.AX,MQG.AX,RIO.AX,TLS.AX,7203.T,6758.T,9984.T,6861.T,8306.T,9433.T,7974.T,0700.HK,9988.HK,1299.HK,0005.HK,3690.HK,0941.HK,1810.HK,RELIANCE.NS,TCS.NS,HDFCBANK.NS,INFY.NS,ICICIBANK.NS,BHARTIARTL.NS,SBIN.NS,LT.NS,600519.SS,601398.SS,600036.SS,601318.SS,000858.SZ,300750.SZ"

deployments:
  - name: dataops-daily
    tags: [dataops, daily, source-handoff, self-host]
    description: Aggregate source-domain refresh; triggers feature-store daily build after source watermarks are ready.
    entrypoint: flows/prefect_dataops_daily.py:dataops_daily_flow
    parameters:
      symbols: null
      region: all
      start: null
      end: null
      lookback_days: null
      publish_enabled: true
      allow_unhealthy: false
      force_recompute_macro: false
      force_recompute_release_calendar: false
      refresh_theme_etfs: true
      trigger_feature_build: true
      feature_build_deployment_name: null
    schedules:
      - cron: "10 23 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool: *self_host_pool

  - name: market-daily
    tags: [dataops, market, daily, self-host]
    description: Daily price/quote ingestion into local Postgres.
    entrypoint: flows/prefect_dataops_daily.py:dataops_market_daily_flow
    parameters:
      symbols: null
      start: null
      end: null
      lookback_days: null
      region: us
      symbol_batch_size: 100
    schedules:
      - cron: "30 11 * * 1-5"
        timezone: "UTC"
        active: true
        parameters: {region: apac}
      - cron: "0 18 * * 1-5"
        timezone: "UTC"
        active: true
        parameters: {region: eu}
      - cron: "30 22 * * 1-5"
        timezone: "UTC"
        active: true
        parameters: {region: us}
    work_pool: *self_host_pool

  - name: market-daily-ramp
    tags: [dataops, market, ramp, self-host]
    description: Parameterized universe ramp; server agent supplies batch symbols.
    entrypoint: flows/prefect_dataops_daily.py:dataops_market_daily_flow
    parameters:
      symbols: null
      start: null
      end: null
      lookback_days: 400
      region: null
      symbol_batch_size: 75
      allow_unhealthy: true
    schedules: []
    work_pool: *self_host_pool

  - name: fundamentals-daily
    tags: [dataops, fundamentals, daily, self-host]
    description: Daily fundamentals ingestion into local Postgres.
    entrypoint: flows/prefect_dataops_daily.py:dataops_fundamentals_daily_flow
    parameters:
      symbols: null
      region: all
      refresh_theme_etfs: true
    schedules:
      - cron: "0 3 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool: *self_host_pool

  - name: earnings-daily
    tags: [dataops, earnings, daily, self-host]
    description: Twice-daily earnings ingestion into local Postgres.
    entrypoint: flows/prefect_dataops_daily.py:dataops_earnings_daily_flow
    parameters:
      symbols: null
      history_limit: 12
      region: all
    schedules:
      - cron: "0 8 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "0 20 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool: *self_host_pool

  - name: macro-daily
    tags: [dataops, macro, daily, self-host]
    description: US macro daily refresh into local Postgres.
    entrypoint: flows/prefect_dataops_daily.py:dataops_macro_daily_flow
    parameters:
      start: null
      end: null
      lookback_days: 730
      force_recompute: false
      trigger_feature_build: false
    schedules:
      - cron: "15 6 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "45 14 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "45 22 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool: *self_host_pool

  - name: release-calendar-daily
    tags: [dataops, macro, release-calendar, daily, self-host]
    description: Economic release calendar refresh into local Postgres.
    entrypoint: flows/prefect_dataops_daily.py:dataops_release_calendar_daily_flow
    parameters:
      start_date: null
      end_date: null
      lookback_days: 730
      force_recompute: false
      sleep_seconds: 0.0
      official_start_year: null
      official_end_year: null
    schedules:
      - cron: "0 5 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "0 15 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool: *self_host_pool

  - name: trading-calendar-daily
    tags: [dataops, calendars, daily, self-host]
    description: Exchange trading calendars into source_cache.calendars.
    entrypoint: flows/dataops_trading_calendar_daily.py:dataops_trading_calendar_daily_flow
    parameters:
      start_date: null
      end_date: null
    schedules:
      - cron: "30 4 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool: *self_host_pool

  - name: daily-production-inference
    tags: [dataops, production, inference, self-host]
    description: Resolve registry active pointer, run promoted model pipeline, persist production signals.
    entrypoint: flows/daily_production_inference.py:daily_production_inference_flow
    parameters:
      strategy_family: spy_signal
      universe: spy
      environment: production
      target_date: null
      orchestrator_command: null
      orchestrator_config_ref: null
      dry_run: false
    schedules:
      - cron: "15 23 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool: *self_host_pool

  - name: ticker-validation
    tags: [dataops, ticker, onboarding, self-host]
    description: On-demand single-ticker validation (triggered by onboarding).
    entrypoint: flows/prefect_dataops_daily.py:dataops_ticker_validation_flow
    parameters:
      region: us
      exchange: null
      instrument_type_hint: null
      history_limit: 12
      publish_registry: true
    schedules: []
    work_pool: *self_host_pool

  - name: ticker-backfill
    tags: [dataops, ticker, onboarding, backfill, self-host]
    description: On-demand full-history all-domain ticker backfill (best-effort earnings/fundamentals).
    entrypoint: flows/prefect_dataops_daily.py:dataops_ticker_backfill_flow
    parameters:
      start: null
      end: null
      history_limit: 100
      region: null
      publish_enabled: true
      allow_unhealthy: false
      trigger_technical_features: true
    schedules: []
    work_pool: *self_host_pool

  - name: ticker-onboarding
    tags: [dataops, ticker, onboarding, self-host]
    description: On-demand onboarding — validation then full backfill; backend triggers this per ticker.
    entrypoint: flows/prefect_dataops_daily.py:dataops_ticker_onboarding_flow
    parameters:
      region: us
      exchange: null
      instrument_type_hint: null
      start: null
      end: null
      history_limit: null
      publish_enabled: true
      trigger_technical_features: true
    schedules: []
    work_pool: *self_host_pool

  - name: ticker-onboarding-bulk
    tags: [dataops, ticker, onboarding, bulk, self-host]
    description: Urgency/bulk onboarding — schedules onboarding runs for a ticker list (Prefect concurrency).
    entrypoint: flows/prefect_dataops_daily.py:dataops_ticker_onboarding_bulk_flow
    parameters:
      region: us
      exchange: null
      start: null
      end: null
      history_limit: null
      publish_enabled: true
      trigger_technical_features: true
      skip_existing: true
    schedules: []
    work_pool: *self_host_pool
