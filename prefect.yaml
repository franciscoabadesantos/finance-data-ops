      - dataops
      - earnings
      - daily
    description: Data Ops earnings daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_earnings_daily_flow
    parameters:
      symbols: null
      history_limit: 12
      region: null
    schedules:
      - cron: "20 3 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-pool
