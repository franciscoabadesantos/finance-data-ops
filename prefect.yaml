      symbols: null
      region: null
    schedules:
      - cron: "50 2 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-pool
      work_queue_name: default
      job_variables: {}

  - name: earnings-daily
    version: null
