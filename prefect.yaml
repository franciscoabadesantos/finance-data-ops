name: finance-data-ops
prefect-version: null

build: []
push: []
pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/franciscoabadesantos/finance-data-ops.git
      branch: main

deployments:
  - name: market-daily
    version: null
    tags:
      - dataops
      - market
      - daily
    description: Data Ops market daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_market_daily_flow
    parameters:
      symbols: null
      start: null
      end: null
      lookback_days: null
      region: us
    schedules:
      - cron: "30 6 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "30 14 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "30 22 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-managed-pool
      work_queue_name: default
      job_variables:
        pip_packages:
          - "numpy>=1.24"
          - "pandas>=2.0"
          - "pyarrow>=10.0"
          - "yfinance>=0.2"
          - "lxml>=4.9"
          - "PyYAML>=6.0"
        env:
          SUPABASE_URL: "{{ prefect.blocks.secret.supabase-url }}"
          SUPABASE_SECRET_KEY: "{{ prefect.blocks.secret.supabase-service-role-key }}"
          BACKEND_BASE_URL: "{{ prefect.blocks.secret.backend-base-url }}"
          BACKEND_SERVICE_TOKEN: "{{ prefect.blocks.secret.backend-service-token }}"
          DATA_OPS_ALERT_WEBHOOK_URL: "{{ prefect.blocks.secret.data-ops-alert-webhook-url }}"
          DATA_OPS_SYMBOLS_US: "AAPL,ADBE,AMD,AMZN,AVGO,BRK.B,COST,DIA,GOOGL,INTC,IWM,JPM,KO,MA,META,MSFT,NFLX,NVDA,PFE,PG,PLTR,QQQ,SPY,TSLA,UBER,UNH,V,VOO,VTI,XOM"
          DATA_OPS_SYMBOLS_EU: "ASML,SAP,SHEL,NVO,HSBC,TTE,AZN,VGK,EZU,BP,UL,SNY,DB,EWI,EWP,EWU,FEZ,GSK"
          # APAC market exclusions (provider compatibility): TTM,WOW,WBC,SAUD,ANZ,EGPT,GAF
          DATA_OPS_SYMBOLS_APAC: "TSM,BABA,SONY,INFY,HDB"

  - name: fundamentals-daily
    version: null
    tags:
      - dataops
      - fundamentals
      - daily
    description: Data Ops fundamentals daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_fundamentals_daily_flow
    parameters:
      symbols: null
      region: us
    schedules:
      - cron: "0 3 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-managed-pool
      work_queue_name: default
      job_variables:
        pip_packages:
          - "numpy>=1.24"
          - "pandas>=2.0"
          - "pyarrow>=10.0"
          - "yfinance>=0.2"
          - "lxml>=4.9"
          - "PyYAML>=6.0"
        env:
          SUPABASE_URL: "{{ prefect.blocks.secret.supabase-url }}"
          SUPABASE_SECRET_KEY: "{{ prefect.blocks.secret.supabase-service-role-key }}"
          DATA_OPS_ALERT_WEBHOOK_URL: "{{ prefect.blocks.secret.data-ops-alert-webhook-url }}"
          DATA_OPS_SYMBOLS_US: "AAPL,ADBE,AMD,AMZN,AVGO,BRK.B,COST,DIA,GOOGL,INTC,IWM,JPM,KO,MA,META,MSFT,NFLX,NVDA,PFE,PG,PLTR,QQQ,SPY,TSLA,UBER,UNH,V,VOO,VTI,XOM"
          DATA_OPS_SYMBOLS_EU: "ASML,SAP,SHEL,NVO,HSBC,TTE,AZN,VGK,EZU,BP,UL,SNY,DB,EWI,EWP,EWU,FEZ,GSK"
          DATA_OPS_SYMBOLS_APAC: "TSM,BABA,JD,BIDU,EWJ,EWT,MCHI,NTES,SONY,KWEB,FXI,KORU,EWY,EWS,EWM,EPHE,VNM,IDX,THD,EIDO,ASEA,INDA,INFY,HDB,IBN,WIT,TTM,RDY,INDY,SMIN,EWA,BHP,RIO,CSL,WOW,WBC,ANZ,ASX,EZA,AFK,NGE,EGPT,GAF,EIS,ISRA,UAE,SAUD,QAT,KSA,EWZ,VALE,PBR,EWW,MELI,ILF,BAP,EC,CX,SBS,BBD,ARGT"

  - name: earnings-daily
    version: null
    tags:
      - dataops
      - earnings
      - daily
    description: Data Ops earnings daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_earnings_daily_flow
    parameters:
      symbols: null
      history_limit: 12
      region: us
    schedules:
      - cron: "0 8 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "0 20 * * 1-5"
        timezone: "UTC"
