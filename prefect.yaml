name: finance-data-ops
prefect-version: null

build: []
push: []
pull: []

deployments:
  - name: market-daily
    version: null
    tags:
      - dataops
      - market
      - daily
    description: Data Ops market daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_market_daily_flow
    parameters:
      symbols: null
      start: null
      end: null
      lookback_days: null
      region: null
    schedules:
      - cron: "30 6 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "30 14 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "30 22 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-managed-pool
      work_queue_name: default
      job_variables: {}

  - name: fundamentals-daily
    version: null
    tags:
      - dataops
      - fundamentals
      - daily
    description: Data Ops fundamentals daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_fundamentals_daily_flow
    parameters:
      symbols: null
      region: null
    schedules:
      - cron: "0 3 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-managed-pool
      work_queue_name: default
      job_variables: {}

  - name: earnings-daily
    version: null
    tags:
      - dataops
      - earnings
      - daily
    description: Data Ops earnings daily orchestration.
    entrypoint: flows/prefect_dataops_daily.py:dataops_earnings_daily_flow
    parameters:
      symbols: null
      history_limit: 12
      region: null
    schedules:
      - cron: "0 8 * * 1-5"
        timezone: "UTC"
        active: true
      - cron: "0 20 * * 1-5"
        timezone: "UTC"
        active: true
    work_pool:
      name: dataops-managed-pool
      work_queue_name: default
      job_variables: {}

  - name: ticker-backfill
    version: null
    tags:
      - dataops
      - backfill
      - ticker
      - event-driven
    description: Targeted backfill orchestration for newly added tickers.
    entrypoint: flows/prefect_dataops_daily.py:dataops_ticker_backfill_flow
    parameters:
      start: null
      end: null
      history_limit: 24
      region: null
    concurrency_limit:
      limit: 4
      collision_strategy: ENQUEUE
    work_pool:
      name: dataops-managed-pool
      work_queue_name: default
      job_variables: {}
    triggers:
      - type: event
        enabled: true
        match:
          prefect.resource.role: ticker
        expect:
          - dataops.ticker.added
        parameters:
          ticker: "{{ event.payload.ticker }}"
          region: "{{ event.payload.region }}"
          start: "{{ event.payload.start }}"
          end: "{{ event.payload.end }}"
          history_limit: "{{ event.payload.history_limit }}"
