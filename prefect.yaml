      job_variables: {}

  - name: ticker-backfill
    version: null
    tags:
      - dataops
      - backfill
      - ticker
      - event-driven
    description: Targeted backfill orchestration for newly added tickers.
    entrypoint: flows/prefect_dataops_daily.py:dataops_ticker_backfill_flow
    parameters:
      ticker: null
      start: null
      end: null
      history_limit: 24
      region: null
    concurrency_limit:
      limit: 4
      collision_strategy: ENQUEUE
    work_pool:
      name: dataops-pool
      work_queue_name: ticker-backfill
      job_variables: {}
    triggers:
      - type: event
        enabled: true
        match:
          prefect.resource.role: ticker
        expect:
          - dataops.ticker.added
        parameters:
          ticker: "{{ event.payload.ticker }}"
          region: "{{ event.payload.region }}"
          start: "{{ event.payload.start }}"
          end: "{{ event.payload.end }}"
          history_limit: "{{ event.payload.history_limit }}"

